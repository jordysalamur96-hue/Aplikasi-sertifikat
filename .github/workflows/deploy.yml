name: Deploy aplikasi-sertifikat

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aplikasi-sertifikat
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run syntax check and tests
        run: npm run check

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            cd /opt/aplikasi-sertifikat/app
            chmod +x ./deploy.sh
            APP_DIR=/opt/aplikasi-sertifikat/app BRANCH=main SERVICE_NAME=aplikasi-sertifikat HEALTH_URL=http://100.66.177.8:8081/ ./deploy.sh
