services:
  aplikasi-sertifikat:
    build: .
    container_name: aplikasi-sertifikat
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP:-100.66.177.8}:${APP_PORT:-8081}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      LOCAL_ADMIN_EMAIL: ${LOCAL_ADMIN_EMAIL:?isi LOCAL_ADMIN_EMAIL di file .env}
      LOCAL_ADMIN_PASSWORD: ${LOCAL_ADMIN_PASSWORD:?isi LOCAL_ADMIN_PASSWORD di file .env}
      TOKEN_SECRET: ${TOKEN_SECRET:?isi TOKEN_SECRET di file .env}
    volumes:
      - /opt/aplikasi-sertifikat/data:/app/data
