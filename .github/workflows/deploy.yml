name: Deploy aplikasi-sertifikat

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-aplikasi-sertifikat
  cancel-in-progress: true

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run syntax check and tests
        run: npm run check

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Tailscale route to server
        run: tailscale ping --timeout=10s --c 3 "${{ secrets.SERVER_HOST }}"

      - name: Deploy to server via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$SERVER_USER@$SERVER_HOST" <<'EOF'
          set -euo pipefail
          cd /opt/aplikasi-sertifikat/app
          chmod +x ./deploy.sh
          APP_DIR=/opt/aplikasi-sertifikat/app BRANCH=main SERVICE_NAME=aplikasi-sertifikat HEALTH_URL=http://100.66.177.8:8081/ ./deploy.sh
          EOF
